<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MONSKILLS</title>
    <style>
      :root {
        --bg-primary: #0a0616;
        --bg-secondary: #0e091c;
        --bg-tertiary: #150e28;
        --fg-primary: #e2e8f0;
        --fg-secondary: #c8d0e8;
        --fg-tertiary: #8490b0;
        --accent-primary: #8b75ff;
        --accent-secondary: #a898ff;
        --accent-gradient: linear-gradient(135deg, #8b75ff 0%, #6366f1 100%);
        --border-subtle: #231a38;
        --border-strong: #2d2245;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
        --shadow-md:
          0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
        --shadow-lg:
          0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
        --radius-sm: 4px;
        --radius-md: 6px;
        --radius-lg: 8px;
        --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
        --spacing-1: 0.25rem;
        --spacing-2: 0.5rem;
        --spacing-3: 0.75rem;
        --spacing-4: 1rem;
        --spacing-6: 1.5rem;
        --spacing-8: 2rem;
        --spacing-12: 3rem;
        --spacing-16: 4rem;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: radial-gradient(
          ellipse at top,
          var(--bg-secondary) 0%,
          var(--bg-primary) 100%
        );
        color: var(--fg-secondary);
        font-family:
          'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', 'Menlo',
          'Consolas', monospace;
        font-size: 15px;
        line-height: 1.7;
        display: flex;
        flex-direction: column;
      }
      a {
        color: var(--accent-primary);
        text-decoration: none;
        transition: color var(--transition-fast);
      }
      a:hover {
        color: var(--accent-secondary);
        text-decoration: underline;
      }

      /* Header bar */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--spacing-3) var(--spacing-6);
        border-bottom: 1px solid var(--border-strong);
        flex-shrink: 0;
        background: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(8px);
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: var(--spacing-4);
      }
      .back-link {
        color: var(--fg-tertiary);
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 0.35rem;
        transition: all var(--transition-fast);
      }
      .back-link:hover {
        color: var(--fg-primary);
        text-decoration: none;
        transform: translateX(-2px);
      }
      .back-link svg {
        width: 14px;
        height: 14px;
      }
      .skill-title {
        color: var(--accent-primary);
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      .copy-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: transparent;
        border: 1px solid var(--border-subtle);
        color: var(--accent-primary);
        font-family: inherit;
        font-size: 12px;
        padding: 0.4rem 0.75rem;
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all var(--transition-fast);
        box-shadow: var(--shadow-sm);
      }
      .copy-btn:hover {
        border-color: var(--accent-primary);
        background: rgba(139, 117, 255, 0.08);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }
      .copy-btn svg {
        width: 12px;
        height: 12px;
        flex-shrink: 0;
      }

      /* Main layout */
      .main {
        display: flex;
        flex: 1;
        min-height: 0;
      }
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
          radial-gradient(
            circle at 20% 30%,
            rgba(139, 117, 255, 0.08) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(99, 102, 241, 0.05) 0%,
            transparent 50%
          );
        pointer-events: none;
        z-index: 0;
      }
      body > * {
        position: relative;
        z-index: 1;
      }

      /* Sidebar */
      .sidebar {
        width: 280px;
        flex-shrink: 0;
        border-right: 1px solid var(--border-strong);
        overflow-y: auto;
        padding: var(--spacing-3) 0;
        background: rgba(0, 0, 0, 0.1);
      }
      .sidebar-item {
        display: block;
        padding: var(--spacing-2) var(--spacing-6);
        cursor: pointer;
        transition: all var(--transition-fast);
        text-decoration: none;
        border-left: 3px solid transparent;
      }
      .sidebar-item:hover {
        background: var(--bg-tertiary);
        text-decoration: none;
        padding-left: calc(var(--spacing-6) + 0.25rem);
      }
      .sidebar-item.active {
        background: var(--bg-tertiary);
        border-left-color: var(--accent-primary);
      }
      .sidebar-item-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--fg-secondary);
        transition: color var(--transition-fast);
      }
      .sidebar-item.active .sidebar-item-name {
        color: var(--accent-primary);
      }
      .sidebar-item-desc {
        color: var(--fg-tertiary);
        font-size: 12px;
        margin-top: 0.15rem;
        line-height: 1.5;
      }

      /* Content area */
      .content {
        flex: 1;
        overflow-y: auto;
        padding: var(--spacing-8) var(--spacing-8);
        min-width: 0;
      }

      /* Markdown styles */
      .content h1,
      .content h2,
      .content h3 {
        color: var(--accent-primary);
        margin: 1.25em 0 0.5em 0;
        font-weight: 600;
      }
      .content h1 {
        font-size: 1.8em;
        border-bottom: 1px solid var(--border-subtle);
        padding-bottom: 0.3em;
      }
      .content h2 {
        font-size: 1.4em;
        text-transform: none;
        letter-spacing: normal;
        border-bottom: 1px solid var(--border-subtle);
        padding-bottom: 0.2em;
      }
      .content h3 {
        font-size: 1.15em;
      }
      .content p {
        margin: 0.85em 0;
        color: var(--fg-secondary);
      }
      .content ul,
      .content ol {
        margin: 0.85em 0;
        padding-left: 1.75em;
      }
      .content li {
        margin: 0.4em 0;
        line-height: 1.7;
      }
      .content code {
        background: var(--bg-tertiary);
        color: var(--accent-secondary);
        padding: 0.15em 0.4em;
        border-radius: var(--radius-sm);
        font-size: 0.92em;
        border: 1px solid var(--border-subtle);
      }
      .content pre {
        background: var(--bg-tertiary);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: var(--spacing-4);
        overflow-x: auto;
        margin: 1.25em 0;
        box-shadow: var(--shadow-sm);
      }
      .content pre code {
        background: none;
        padding: 0;
        color: var(--fg-primary);
        border: none;
      }
      .content blockquote {
        border-left: 4px solid var(--accent-primary);
        margin: 1.25em 0;
        padding: 0.5em 1.25em;
        color: var(--fg-tertiary);
        background: rgba(139, 117, 255, 0.05);
        border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      }
      .content table {
        border-collapse: collapse;
        width: 100%;
        margin: 1.25em 0;
        font-size: 14px;
        border-radius: var(--radius-md);
        overflow: hidden;
        box-shadow: var(--shadow-sm);
      }
      .content th,
      .content td {
        border: 1px solid var(--border-subtle);
        padding: 0.6rem 0.8rem;
        text-align: left;
      }
      .content th {
        background: var(--bg-tertiary);
        color: var(--accent-primary);
        font-weight: 600;
      }
      .content a {
        color: var(--accent-primary);
      }
      .content strong {
        color: var(--fg-primary);
        font-weight: 600;
      }

      .loading {
        color: var(--fg-tertiary);
        padding: var(--spacing-8) 0;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }
      .error {
        color: #d4605f;
        padding: 2rem 0;
      }

      /* Mobile */
      @media (max-width: 700px) {
        .main {
          flex-direction: column;
        }
        .header {
          padding: var(--spacing-2) var(--spacing-4);
        }
        .sidebar {
          width: 100%;
          border-right: none;
          border-bottom: 1px solid var(--border-strong);
          max-height: 40vh;
        }
        .sidebar-item {
          border-left: none;
          border-bottom: 1px solid var(--border-subtle);
          padding: var(--spacing-3) var(--spacing-4);
        }
        .sidebar-item:hover {
          padding-left: var(--spacing-4);
        }
        .sidebar-item.active {
          border-left: none;
          border-bottom-color: var(--accent-primary);
        }
        .content {
          padding: var(--spacing-4);
        }
        .content h1 {
          font-size: 1.5em;
        }
        .content h2 {
          font-size: 1.2em;
        }
      }
      @media (max-width: 480px) {
        .skill-title {
          font-size: 14px;
        }
        .copy-btn span {
          display: none;
        }
        .content {
          padding: var(--spacing-3);
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-left">
        <a href="/" class="back-link"
          ><svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
          Back</a
        >
        <span class="skill-title" id="skill-title">Skills</span>
      </div>
      <button class="copy-btn" id="copy-btn">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="9" y="9" width="13" height="13" rx="2" />
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
        </svg>
        <span id="copy-label">Copy URL</span>
      </button>
    </div>

    <div class="main">
      <nav class="sidebar" id="sidebar"></nav>
      <div class="content" id="content">
        <p class="loading">Select a skill to view its documentation.</p>
      </div>
    </div>

    <script>
      const SKILLS = [
        {
          id: 'scaffold',
          name: 'Scaffold',
          desc: 'End-to-end guide from idea to production. Project structure, onchain decisions, OpenZeppelin contracts.',
        },
        {
          id: 'why-monad',
          name: 'Why Monad',
          desc: '10,000 tps, 400ms block time, 800ms finality, and full Ethereum compatibility.',
        },
        {
          id: 'concepts',
          name: 'Concepts',
          desc: 'Monad architecture concepts that affect app development. Async execution, block states, reserve balance, EIP-7702, real-time data.',
        },
        {
          id: 'addresses',
          name: 'Addresses',
          desc: 'Smart contract addresses for well known protocols on Monad. Testnet and mainnet.',
        },
        {
          id: 'wallet',
          name: 'Wallet',
          desc: 'Agent wallet management, Safe multisig creation, and deploying contracts via Safe.',
        },
        {
          id: 'wallet-integration',
          name: 'Wallet Integration',
          desc: 'Integrate wallet connection into a Next.js app using RainbowKit with Wagmi and viem.',
        },
        {
          id: 'vercel-deploy',
          name: 'Vercel Deploy',
          desc: 'Deploy to Vercel without CLI or auth. Returns a preview URL and claim URL.',
        },
        {
          id: 'gas',
          name: 'Gas',
          desc: 'How gas pricing works on Monad vs Ethereum. Opcode pricing, gas limits, and developer guidelines.',
        },
        {
          id: 'tooling-and-infra',
          name: 'Tooling & Infra',
          desc: 'Directory of tooling and infrastructure providers that support Monad mainnet and testnet.',
        },
      ];

      const sidebar = document.getElementById('sidebar');
      const content = document.getElementById('content');
      const titleEl = document.getElementById('skill-title');
      const copyBtn = document.getElementById('copy-btn');
      const copyLabel = document.getElementById('copy-label');

      // Build sidebar
      SKILLS.forEach((skill) => {
        const item = document.createElement('a');
        item.className = 'sidebar-item';
        item.href = 'skill.html?name=' + skill.id;
        item.dataset.skill = skill.id;
        item.innerHTML =
          '<div class="sidebar-item-name">' +
          skill.name +
          '</div><div class="sidebar-item-desc">' +
          skill.desc +
          '</div>';
        item.addEventListener('click', (e) => {
          e.preventDefault();
          loadSkill(skill.id);
          history.pushState(null, '', 'skill.html?name=' + skill.id);
        });
        sidebar.appendChild(item);
      });

      function loadSkill(id) {
        const skill = SKILLS.find((s) => s.id === id);
        if (!skill) return;

        const skillUrl = 'https://skills.devnads.com/' + id + '/SKILL.md';

        // Update header
        document.title = skill.name + ' — MONSKILLS';
        titleEl.textContent = skill.name;
        copyLabel.textContent = id + '/SKILL.md';

        // Update active sidebar item
        document.querySelectorAll('.sidebar-item').forEach((el) => {
          el.classList.toggle('active', el.dataset.skill === id);
        });

        // Load content
        content.innerHTML = '<p class="loading">Loading...</p>';
        fetch(id + '/SKILL.md')
          .then((r) => {
            if (!r.ok) throw new Error(r.statusText);
            return r.text();
          })
          .then((text) => {
            content.innerHTML = renderMarkdown(text);
            content.style.opacity = '0';
            content.scrollTop = 0;
            requestAnimationFrame(() => {
              content.style.transition = 'opacity 0.3s ease-out';
              content.style.opacity = '1';
            });
          })
          .catch((err) => {
            content.innerHTML =
              '<p class="error">Could not load skill: ' +
              escHtml(err.message) +
              '.</p>';
          });
      }

      // Copy URL
      {
        const origHTML = copyBtn.innerHTML;
        let timer;
        copyBtn.addEventListener('click', async () => {
          const params = new URLSearchParams(window.location.search);
          const name = params.get('name');
          if (!name) return;
          const url = 'https://skills.devnads.com/' + name + '/SKILL.md';
          try {
            await navigator.clipboard.writeText(url);
          } catch (err) {
            const t = document.createElement('textarea');
            t.value = url;
            document.body.appendChild(t);
            t.select();
            document.execCommand('copy');
            document.body.removeChild(t);
          }
          clearTimeout(timer);
          copyBtn.style.transform = 'translateY(-2px) scale(1.05)';
          copyBtn.innerHTML =
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
          timer = setTimeout(() => {
            copyBtn.innerHTML = origHTML;
            copyBtn.style.transform = '';
          }, 1500);
        });
      }

      // Handle back/forward
      window.addEventListener('popstate', () => {
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        if (name && SKILLS.find((s) => s.id === name)) loadSkill(name);
      });

      // Load initial skill from URL or default to first
      const params = new URLSearchParams(window.location.search);
      const initial = params.get('name');
      if (initial && SKILLS.find((s) => s.id === initial)) {
        loadSkill(initial);
      } else {
        loadSkill(SKILLS[0].id);
        history.replaceState(null, '', 'skill.html?name=' + SKILLS[0].id);
      }

      function escHtml(s) {
        return s
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function renderMarkdown(md) {
        const esc = escHtml;
        const inline = (s) =>
          esc(s)
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/`([^`]+)`/g, '<code>$1</code>')
            .replace(
              /\[([^\]]+)\]\(([^)]+)\)/g,
              '<a href="$2" target="_blank" rel="noopener">$1</a>'
            );
        let raw = md.replace(/\r\n?/g, '\n');
        if (raw.startsWith('---\n')) {
          const end = raw.indexOf('\n---', 4);
          if (end !== -1) raw = raw.slice(end + 4).replace(/^\n+/, '');
        }
        let out = '';
        const lines = raw.split('\n');
        let i = 0;
        while (i < lines.length) {
          const line = lines[i];
          if (/^```(\w*)\s*$/.test(line)) {
            let block = '';
            for (i++; i < lines.length && !/^```\s*$/.test(lines[i]); i++)
              block += esc(lines[i]) + '\n';
            i++;
            out += '<pre><code>' + block + '</code></pre>';
            continue;
          }
          if (/^(#{1,3})\s+(.+)$/.test(line)) {
            const l = RegExp.$1.length;
            out += '<h' + l + '>' + inline(RegExp.$2) + '</h' + l + '>';
            i++;
            continue;
          }
          if (/^\|.+\|$/.test(line)) {
            const rows = [];
            while (i < lines.length && /^\|.+\|$/.test(lines[i])) {
              if (!/^\|[-:\s|]+\|$/.test(lines[i])) {
                rows.push(
                  lines[i]
                    .split('|')
                    .slice(1, -1)
                    .map((c) => c.trim())
                );
              }
              i++;
            }
            if (rows.length) {
              out += '<table><thead><tr>';
              rows[0].forEach((c) => {
                out += '<th>' + inline(c) + '</th>';
              });
              out += '</tr></thead><tbody>';
              for (let r = 1; r < rows.length; r++) {
                out += '<tr>';
                rows[r].forEach((c) => {
                  out += '<td>' + inline(c) + '</td>';
                });
                out += '</tr>';
              }
              out += '</tbody></table>';
            }
            continue;
          }
          if (/^>\s?(.*)$/.test(line)) {
            let block = inline(RegExp.$1);
            for (i++; i < lines.length && /^>\s?(.*)$/.test(lines[i]); i++)
              block += '\n' + inline(RegExp.$1);
            out +=
              '<blockquote>' + block.replace(/\n/g, '<br>') + '</blockquote>';
            continue;
          }
          if (/^[-*]\s+(.+)$/.test(line)) {
            out += '<ul>';
            while (i < lines.length && /^[-*]\s+(.+)$/.test(lines[i])) {
              out += '<li>' + inline(RegExp.$1) + '</li>';
              i++;
            }
            out += '</ul>';
            continue;
          }
          if (/^\d+\.\s+(.+)$/.test(line)) {
            out += '<ol>';
            while (i < lines.length && /^\d+\.\s+(.+)$/.test(lines[i])) {
              out += '<li>' + inline(RegExp.$1) + '</li>';
              i++;
            }
            out += '</ol>';
            continue;
          }
          if (line.trim() === '') {
            i++;
            continue;
          }
          out += '<p>' + inline(line) + '</p>';
          i++;
        }
        return out;
      }
    </script>
  </body>
</html>
