[profile.default]
src = "contracts/src"
test = "contracts/test"
out = "contracts/out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
monad-testnet = "https://testnet-rpc-monad.blastapi.io"
